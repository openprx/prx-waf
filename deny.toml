# cargo-deny configuration — OpenPRX standard v2

[graph]
all-features = true
exclude-dev = false

[output]
feature-depth = 1

[advisories]
yanked = "deny"
unmaintained = "all"
unsound = "workspace"
# Every ignore below has been re-verified against the live dependency tree on 2026-07-19.
# Review all ignores by: 2026-10-01
ignore = [
    # protobuf 2.28.0 recursive-parsing stack overflow — path: prometheus 0.13.4 -> protobuf v2,
    # pulled by pingora-core 0.8.0. protobuf v2 has no fix; pingora 0.8 pins prometheus 0.13.
    # No safe pingora release yet (main has moved off it, but no 0.9.x published). Verified present.
    { id = "RUSTSEC-2024-0437", reason = "protobuf v2: transitive via pingora 0.8 -> prometheus 0.13; no fixed release, pingora-locked" },
    # daemonize 0.5.0 unmaintained — path: pingora-core 0.8.0. Only used by pingora's daemon-mode
    # process forking; no maintained replacement until pingora drops it. Verified present.
    { id = "RUSTSEC-2025-0069", reason = "daemonize: unmaintained, pingora 0.8 transitive; no replacement until pingora upgrades" },
    # derivative 2.2.0 unmaintained — path: pingora-core 0.8.0. Build-time derive macro only,
    # not part of the shipped runtime. Verified present.
    { id = "RUSTSEC-2024-0388", reason = "derivative: unmaintained build-time derive macro, pingora 0.8 transitive" },
    # proc-macro-error2 2.0.1 unmaintained — path: pingora-cache 0.8.0 -> cf-rustracing-jaeger ->
    # local-ip-address -> neli -> getset -> proc-macro-error2. Build-time proc-macro only, never
    # linked into the runtime binary; pingora-locked. Verified present.
    { id = "RUSTSEC-2026-0173", reason = "proc-macro-error2: unmaintained build-time proc-macro, pingora 0.8 transitive; not in runtime" },
    # rsa 0.9.10 Marvin timing sidechannel — NO fixed release exists upstream (patched = []).
    # Real path: rsa -> jsonwebtoken (rust_crypto) -> waf-api, so the crate IS compiled. However
    # waf-api signs and verifies JWTs exclusively with HMAC (EncodingKey/DecodingKey::from_secret
    # => HS256, Validation::default() locks the algorithm to HS256, see crates/waf-api/src/auth.rs).
    # The RSA private-key operations Marvin targets are never invoked, so it is not exploitable here.
    #
    # Removal paths evaluated & rejected on 2026-07-19 (goal: get rsa out of Cargo.lock entirely):
    #   1. jsonwebtoken HMAC-only feature trim — IMPOSSIBLE. jsonwebtoken 10.3/10.4 gate all
    #      RustCrypto algorithms behind one monolithic `rust_crypto` feature that hard-bundles
    #      rsa together with hmac (features = [ed25519-dalek, hmac, p256, p384, rand, rsa, sha2]);
    #      there is no HMAC-only sub-feature, so rsa cannot be excluded while keeping HS256.
    #   2. jsonwebtoken `aws_lc_rs` backend — TECHNICALLY WORKS (rsa leaves the tree, all 13 auth
    #      unit tests pass with auth.rs unchanged) but REJECTED: it re-adds aws-lc-rs/aws-lc-sys,
    #      directly reversing commit 1b7e23f which deliberately purged aws-lc-rs so that `ring`
    #      is the sole crypto provider (dual providers previously panicked rustls at cluster/HTTP3
    #      startup) and adds a cmake/C-toolchain build burden.
    #   3. Replace jsonwebtoken with a pure-Rust HMAC lib (jwt crate) or a hand-rolled HS256 —
    #      REJECTED: rewrites security-critical auth token signing/verification (regression risk
    #      against the auth red-line) or pulls in an unmaintained crate, to silence an advisory
    #      that is already unexploitable with no upstream fix.
    # Conclusion: keeping this documented ignore is the lowest-real-risk option.
    { id = "RUSTSEC-2023-0071", reason = "rsa Marvin: compiled via jsonwebtoken(rust_crypto) but waf-api uses only HMAC/HS256; RSA code path unreachable; no upstream fix; removal via aws_lc_rs rejected (reverses ring-only commit 1b7e23f), feature-trim impossible (rust_crypto bundles rsa+hmac), lib swap risks auth regression" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "0BSD",
    "BSL-1.0",
    "CC0-1.0",
]
confidence-threshold = 0.8
include-dev = false
include-build = true
unused-allowed-license = "allow"

[licenses.private]
ignore = true

[[licenses.clarify]]
crate = "maker"
expression = "MIT"
license-files = []

[bans]
multiple-versions = "warn"
wildcards = "warn"
allow-wildcard-paths = true
allow-workspace = true
highlight = "all"

deny = [
    { crate = "openssl", reason = "Use rustls-tls instead", use-instead = "rustls" },
    { crate = "openssl-sys", reason = "Use rustls-tls instead" },
]

[[bans.features]]
crate = "reqwest"
deny = ["native-tls", "native-tls-vendored"]

[bans.workspace-dependencies]
duplicates = "warn"
unused = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
]
allow-git = [
    "https://github.com/lionsoul2014/ip2region.git",
]
