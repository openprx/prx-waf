version: "1.0"
description: "OWASP API Security - Injection Attacks (API8:2023)"
source: "prx-waf community rules"
license: "Apache-2.0"

rules:
  - id: "API-INJ-001"
    name: "GraphQL Introspection Query Abuse"
    category: "injection"
    severity: "medium"
    paranoia: 2
    field: "body"
    operator: "regex"
    value: "(?i)(?:__schema|__type|__typename)\\s*(?:\\{|\\()"
    action: "log"
    tags: ["owasp-api", "graphql", "introspection", "api8-2023"]
    reference: "https://graphql.org/learn/introspection/"

  - id: "API-INJ-002"
    name: "GraphQL Deep Nested Query DoS Attack"
    category: "injection"
    severity: "high"
    paranoia: 2
    field: "body"
    operator: "regex"
    value: "(?i)\\{[^}]*\\{[^}]*\\{[^}]*\\{[^}]*\\{[^}]*\\{[^}]*\\{[^}]*\\{"
    action: "block"
    tags: ["owasp-api", "graphql", "dos", "nested-query", "api8-2023"]
    reference: "https://owasp.org/API-Security/editions/2023/en/0xa4-unrestricted-resource-consumption/"

  - id: "API-INJ-003"
    name: "GraphQL Field Suggestion Enumeration"
    category: "injection"
    severity: "medium"
    paranoia: 2
    field: "body"
    operator: "regex"
    value: "(?i)(?:__(?:inputFields|enumValues|fields|possibleTypes)|IntrospectionQuery)"
    action: "log"
    tags: ["owasp-api", "graphql", "enumeration", "api8-2023"]
    reference: "https://portswigger.net/web-security/graphql"

  - id: "API-INJ-004"
    name: "NoSQL Injection - MongoDB Comparison Operators"
    category: "injection"
    severity: "critical"
    paranoia: 1
    field: "all"
    operator: "regex"
    value: "(?i)[\"']?\\$(?:gt|lt|gte|lte|ne|eq|in|nin|exists|type|mod|size|all|elemMatch|where|regex|text|near|geoWithin|geoIntersects|nearSphere|box|center|centerSphere|geometry|maxDistance|minDistance)\"?\\s*:"
    action: "block"
    tags: ["owasp-api", "nosql-injection", "mongodb", "api8-2023"]
    reference: "https://owasp.org/www-project-web-security-testing-guide/v42/4-Web_Application_Security_Testing/07-Input_Validation_Testing/05.6-Testing_for_NoSQL_Injection"

  - id: "API-INJ-005"
    name: "NoSQL Injection - MongoDB $where JavaScript Execution"
    category: "injection"
    severity: "critical"
    paranoia: 1
    field: "all"
    operator: "regex"
    value: "(?i)\\$where\\s*:\\s*(?:\"|')(?:function|this\\.|new\\s+Function|eval\\s*\\()"
    action: "block"
    tags: ["owasp-api", "nosql-injection", "mongodb", "rce", "api8-2023"]
    reference: "https://owasp.org/www-project-web-security-testing-guide/v42/4-Web_Application_Security_Testing/07-Input_Validation_Testing/05.6-Testing_for_NoSQL_Injection"

  - id: "API-INJ-006"
    name: "NoSQL Injection - Array Operator Injection in Query"
    category: "injection"
    severity: "high"
    paranoia: 1
    field: "query"
    operator: "regex"
    value: "(?i)\\[(?:\\$(?:gt|lt|gte|lte|ne|eq|in|nin|regex|where))\\]|\\$(?:gt|lt|gte|lte|ne)="
    action: "block"
    tags: ["owasp-api", "nosql-injection", "mongodb", "api8-2023"]
    reference: "https://owasp.org/www-project-web-security-testing-guide/v42/4-Web_Application_Security_Testing/07-Input_Validation_Testing/05.6-Testing_for_NoSQL_Injection"

  - id: "API-INJ-007"
    name: "LDAP Injection in API Parameters"
    category: "injection"
    severity: "high"
    paranoia: 1
    field: "all"
    operator: "regex"
    value: "(?i)(?:\\*\\)\\s*(?:cn|uid|mail|dc|ou|objectClass)|\\(\\|\\s*\\(|\\(\\&\\s*\\(|\\)\\s*\\(|\\*\\)(?:%00|\\0))"
    action: "block"
    tags: ["owasp-api", "ldap-injection", "api8-2023"]
    reference: "https://owasp.org/www-project-web-security-testing-guide/v42/4-Web_Application_Security_Testing/07-Input_Validation_Testing/06-Testing_for_LDAP_Injection"

  - id: "API-INJ-008"
    name: "LDAP Injection - Special Character Sequences"
    category: "injection"
    severity: "high"
    paranoia: 2
    field: "all"
    operator: "regex"
    value: "(?i)(?:\\*\\(uid=\\*\\)|\\(cn=\\*\\)|\\(mail=\\*\\)|\\)\\(|admin\\)\\(|\\|\\(objectClass=\\*\\))"
    action: "block"
    tags: ["owasp-api", "ldap-injection", "api8-2023"]
    reference: "https://cheatsheetseries.owasp.org/cheatsheets/LDAP_Injection_Prevention_Cheat_Sheet.html"

  - id: "API-INJ-009"
    name: "XXE via API - DOCTYPE Declaration"
    category: "injection"
    severity: "critical"
    paranoia: 1
    field: "body"
    operator: "regex"
    value: "(?i)<!\\s*(?:DOCTYPE|ENTITY)\\s+[a-zA-Z_][a-zA-Z0-9_.-]*\\s+(?:SYSTEM|PUBLIC)\\s+"
    action: "block"
    tags: ["owasp-api", "xxe", "api8-2023"]
    reference: "https://owasp.org/www-project-web-security-testing-guide/v42/4-Web_Application_Security_Testing/07-Input_Validation_Testing/07-Testing_for_XML_Injection"

  - id: "API-INJ-010"
    name: "XXE via API - External Entity Reference"
    category: "injection"
    severity: "critical"
    paranoia: 1
    field: "body"
    operator: "regex"
    value: "(?i)&[a-zA-Z_][a-zA-Z0-9_.-]*;\\s*(?:SYSTEM|PUBLIC|file:|http:|ftp:|gopher:|expect:)"
    action: "block"
    tags: ["owasp-api", "xxe", "external-entity", "api8-2023"]
    reference: "https://portswigger.net/web-security/xxe"

  - id: "API-INJ-011"
    name: "SSRF via API - Internal RFC1918 IP in Parameter"
    category: "injection"
    severity: "critical"
    paranoia: 1
    field: "all"
    operator: "regex"
    value: "(?i)(?:url|endpoint|host|target|redirect|callback|webhook|proxy|dest(?:ination)?|src|source|image_url|avatar_url|profile_url)\\s*[=:]\\s*(?:https?://)?(?:10\\.(?:[0-9]{1,3}\\.){2}[0-9]{1,3}|172\\.(?:1[6-9]|2[0-9]|3[01])\\.(?:[0-9]{1,3}\\.)[0-9]{1,3}|192\\.168\\.[0-9]{1,3}\\.[0-9]{1,3}|127\\.[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}|localhost)"
    action: "block"
    tags: ["owasp-api", "ssrf", "api8-2023"]
    reference: "https://portswigger.net/web-security/ssrf"

  - id: "API-INJ-012"
    name: "SSRF via API - Cloud Metadata Endpoint in Parameter"
    category: "injection"
    severity: "critical"
    paranoia: 1
    field: "all"
    operator: "regex"
    value: "(?i)169\\.254\\.169\\.254|metadata\\.google\\.internal|169\\.254\\.170\\.2|metadata\\.internal|aws\\.amazon\\.com/meta|169\\.254\\.169\\.253"
    action: "block"
    tags: ["owasp-api", "ssrf", "cloud-metadata", "api8-2023"]
    reference: "https://portswigger.net/web-security/ssrf"

  - id: "API-INJ-013"
    name: "SSRF via API - URL Schema Abuse"
    category: "injection"
    severity: "critical"
    paranoia: 1
    field: "all"
    operator: "regex"
    value: "(?i)(?:url|endpoint|src|href|target|redirect|callback|fetch|proxy)\\s*[=:]\\s*(?:file:|gopher:|dict:|ftp://(?:127|10|172|192)|sftp://|tftp://|ldap://|jar:|netdoc:)"
    action: "block"
    tags: ["owasp-api", "ssrf", "schema-abuse", "api8-2023"]
    reference: "https://portswigger.net/web-security/ssrf"

  - id: "API-INJ-014"
    name: "GraphQL Mutation with Suspicious System Operations"
    category: "injection"
    severity: "high"
    paranoia: 2
    field: "body"
    operator: "regex"
    value: "(?i)mutation\\s*(?:[a-zA-Z_][a-zA-Z0-9_]*\\s*)?\\{[^}]*(?:deleteAll|dropTable|truncate|execCommand|runScript|evalCode|systemExec)"
    action: "block"
    tags: ["owasp-api", "graphql", "mutation-abuse", "api8-2023"]
    reference: "https://portswigger.net/web-security/graphql"

  - id: "API-INJ-015"
    name: "GraphQL Alias Overloading Attack"
    category: "injection"
    severity: "high"
    paranoia: 2
    field: "body"
    operator: "regex"
    value: "(?i)(?:[a-zA-Z_][a-zA-Z0-9_]*\\s*:\\s*[a-zA-Z_][a-zA-Z0-9_]*\\s*\\([^)]*\\)\\s*\\{[^}]*\\}\\s*){10,}"
    action: "block"
    tags: ["owasp-api", "graphql", "alias-overloading", "dos", "api8-2023"]
    reference: "https://portswigger.net/web-security/graphql"
