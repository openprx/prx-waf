version: "1.0"
description: "Advanced SSRF Detection - Comprehensive Server-Side Request Forgery Rules"
source: "prx-waf community rules"
license: "Apache-2.0"

rules:
  - id: "ADV-SSRF-001"
    name: "SSRF - RFC1918 10.x.x.x Range in Any Parameter"
    category: "ssrf"
    severity: "critical"
    paranoia: 1
    field: "all"
    operator: "regex"
    value: "(?i)(?:(?:https?|ftp)://)?10\\.(?:[0-9]{1,3}\\.){2}[0-9]{1,3}(?:[:/]|$)"
    action: "block"
    tags: ["advanced", "ssrf", "internal-network", "rfc1918"]
    reference: "https://portswigger.net/web-security/ssrf"

  - id: "ADV-SSRF-002"
    name: "SSRF - RFC1918 172.16-31.x.x Range in Any Parameter"
    category: "ssrf"
    severity: "critical"
    paranoia: 1
    field: "all"
    operator: "regex"
    value: "(?i)(?:https?://)?172\\.(?:1[6-9]|2[0-9]|3[01])\\.[0-9]{1,3}\\.[0-9]{1,3}(?:[:/]|$)"
    action: "block"
    tags: ["advanced", "ssrf", "internal-network", "rfc1918"]
    reference: "https://portswigger.net/web-security/ssrf"

  - id: "ADV-SSRF-003"
    name: "SSRF - RFC1918 192.168.x.x Range in Any Parameter"
    category: "ssrf"
    severity: "critical"
    paranoia: 1
    field: "all"
    operator: "regex"
    value: "(?i)(?:https?://)?192\\.168\\.[0-9]{1,3}\\.[0-9]{1,3}(?:[:/]|$)"
    action: "block"
    tags: ["advanced", "ssrf", "internal-network", "rfc1918"]
    reference: "https://portswigger.net/web-security/ssrf"

  - id: "ADV-SSRF-004"
    name: "SSRF - Loopback Address (127.x.x.x)"
    category: "ssrf"
    severity: "critical"
    paranoia: 1
    field: "all"
    operator: "regex"
    value: "(?i)(?:https?://)?127\\.[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}(?:[:/]|$|%)"
    action: "block"
    tags: ["advanced", "ssrf", "loopback"]
    reference: "https://portswigger.net/web-security/ssrf"

  - id: "ADV-SSRF-005"
    name: "SSRF - Link-Local Address (169.254.x.x) - APIPA/Cloud Metadata"
    category: "ssrf"
    severity: "critical"
    paranoia: 1
    field: "all"
    operator: "regex"
    value: "(?i)169\\.254\\.[0-9]{1,3}\\.[0-9]{1,3}"
    action: "block"
    tags: ["advanced", "ssrf", "link-local", "cloud-metadata"]
    reference: "https://portswigger.net/web-security/ssrf"

  - id: "ADV-SSRF-006"
    name: "SSRF - AWS EC2 Instance Metadata Service"
    category: "ssrf"
    severity: "critical"
    paranoia: 1
    field: "all"
    operator: "regex"
    value: "(?i)(?:169\\.254\\.169\\.254|fd00:ec2::254|instance-data\\.ec2\\.internal|metadata\\.ec2\\.aws)"
    action: "block"
    tags: ["advanced", "ssrf", "aws-metadata", "cloud-metadata"]
    reference: "https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/ec2-instance-metadata.html"

  - id: "ADV-SSRF-007"
    name: "SSRF - Google Cloud Metadata Service"
    category: "ssrf"
    severity: "critical"
    paranoia: 1
    field: "all"
    operator: "regex"
    value: "(?i)metadata\\.google(?:\\.internal)?|metadata\\.goog|computeMetadata/v[0-9]"
    action: "block"
    tags: ["advanced", "ssrf", "gcp-metadata", "cloud-metadata"]
    reference: "https://cloud.google.com/compute/docs/metadata/overview"

  - id: "ADV-SSRF-008"
    name: "SSRF - Azure Instance Metadata Service"
    category: "ssrf"
    severity: "critical"
    paranoia: 1
    field: "all"
    operator: "regex"
    value: "(?i)169\\.254\\.169\\.254/metadata|169\\.254\\.170\\.2|169\\.254\\.169\\.250|imds\\.azure"
    action: "block"
    tags: ["advanced", "ssrf", "azure-metadata", "cloud-metadata"]
    reference: "https://docs.microsoft.com/en-us/azure/virtual-machines/instance-metadata-service"

  - id: "ADV-SSRF-009"
    name: "SSRF - Dangerous URL Schemes (file, gopher, dict)"
    category: "ssrf"
    severity: "critical"
    paranoia: 1
    field: "all"
    operator: "regex"
    value: "(?i)(?:file://|gopher://|dict://|ldap://|tftp://|jar://|netdoc://|sftp://|scp://|phar://)[a-zA-Z0-9/._-]"
    action: "block"
    tags: ["advanced", "ssrf", "schema-abuse"]
    reference: "https://portswigger.net/web-security/ssrf"

  - id: "ADV-SSRF-010"
    name: "SSRF - FTP to Internal Host"
    category: "ssrf"
    severity: "critical"
    paranoia: 1
    field: "all"
    operator: "regex"
    value: "(?i)ftp://(?:127\\.|10\\.|172\\.(?:1[6-9]|2[0-9]|3[01])\\.|192\\.168\\.)"
    action: "block"
    tags: ["advanced", "ssrf", "ftp", "internal-network"]
    reference: "https://portswigger.net/web-security/ssrf"

  - id: "ADV-SSRF-011"
    name: "SSRF - localhost / loopback Hostname Variants"
    category: "ssrf"
    severity: "critical"
    paranoia: 1
    field: "all"
    operator: "regex"
    value: "(?i)(?:^|[=&?/])(?:https?://)?(?:localhost|0\\.0\\.0\\.0|0x7f000001|2130706433|017700000001|0x7f\\.0x00\\.0x00\\.0x01|::1|\\[::1\\]|\\[0:0:0:0:0:ffff:127\\.0\\.0\\.1\\])(?:[:/]|$|\\?)"
    action: "block"
    tags: ["advanced", "ssrf", "localhost-bypass"]
    reference: "https://portswigger.net/web-security/ssrf"

  - id: "ADV-SSRF-012"
    name: "SSRF - DNS Rebinding via Subdomain Pattern"
    category: "ssrf"
    severity: "high"
    paranoia: 2
    field: "all"
    operator: "regex"
    value: "(?i)(?:[a-zA-Z0-9-]+\\.)?(?:169\\.254\\.169\\.254|192\\.168\\.[0-9]+\\.[0-9]+|10\\.[0-9]+\\.[0-9]+\\.[0-9]+|127\\.[0-9]+\\.[0-9]+\\.[0-9]+)\\.(?:nip\\.io|xip\\.io|sslip\\.io|bc\\.googleusercontent\\.com)"
    action: "block"
    tags: ["advanced", "ssrf", "dns-rebinding"]
    reference: "https://portswigger.net/web-security/ssrf/url-validation-bypass-via-dns-rebinding"

  - id: "ADV-SSRF-013"
    name: "SSRF - Open Redirect as SSRF Vector"
    category: "ssrf"
    severity: "high"
    paranoia: 2
    field: "query"
    operator: "regex"
    value: "(?i)(?:^|&)(?:url|next|redirect|return|callback|goto|dest|destination|target|link|continue|back|path)=(?:https?://|//)[a-zA-Z0-9._-]"
    action: "log"
    tags: ["advanced", "ssrf", "open-redirect"]
    reference: "https://portswigger.net/web-security/ssrf"

  - id: "ADV-SSRF-014"
    name: "SSRF - IPv6 Internal Address in Parameter"
    category: "ssrf"
    severity: "critical"
    paranoia: 1
    field: "all"
    operator: "regex"
    value: "(?i)(?:https?://)?\\[(?:::1|::ffff:(?:127|10|192\\.168)|fc00:|fd[0-9a-f]{2}:|fe80:)(?:[0-9a-f:]+)?\\]"
    action: "block"
    tags: ["advanced", "ssrf", "ipv6", "internal-network"]
    reference: "https://portswigger.net/web-security/ssrf"

  - id: "ADV-SSRF-015"
    name: "SSRF - Decimal/Octal/Hex Encoded IP"
    category: "ssrf"
    severity: "critical"
    paranoia: 1
    field: "all"
    operator: "regex"
    value: "(?i)(?:https?://)?(?:0x[0-9a-f]{8}|0[0-7]{11}|[0-9]{8,10})(?:[:/]|$)"
    action: "block"
    tags: ["advanced", "ssrf", "ip-encoding-bypass"]
    reference: "https://portswigger.net/web-security/ssrf/url-validation-bypass"
