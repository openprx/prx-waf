[proxy]
listen_addr = "0.0.0.0:80"
listen_addr_tls = "0.0.0.0:443"

[api]
listen_addr = "0.0.0.0:9527"

[storage]
database_url = "postgresql://prx_waf:prx_waf@postgres:5432/prx_waf"
max_connections = 20

# ── Phase 5: Response Caching ─────────────────────────────────────────────────
[cache]
enabled = true
max_size_mb = 256
default_ttl_secs = 60
max_ttl_secs = 3600

# ── Phase 5: HTTP/3 (QUIC) ────────────────────────────────────────────────────
# HTTP/3 needs a TLS cert + key, so it stays off for a zero-config single node.
# It auto-enables once BOTH cert_pem and key_pem are configured (no need to also
# flip `enabled`); uncomment those two lines to turn it on.
[http3]
enabled = false
listen_addr = "0.0.0.0:443"
# cert_pem = "/etc/prx-waf/tls/cert.pem"
# key_pem  = "/etc/prx-waf/tls/key.pem"

# ── GeoIP-based access control ────────────────────────────────────────────────
# Enabled by default. Pure-detection feature that degrades gracefully: when the
# xdb database files are missing the service logs a warning and is skipped (no
# blocking, no crash), and it has no effect until country/region rules are added.
# Download the databases with:  prx-waf geoip download
[geoip]
enabled = true
ipv4_xdb_path = "data/ip2region_v4.xdb"
ipv6_xdb_path = "data/ip2region_v6.xdb"
# Cache policy: full_memory (~20MB, fastest) | vector_index (~2MB) | no_cache
cache_policy = "full_memory"

# ── Phase 5: Security Hardening ───────────────────────────────────────────────
[security]
# List of IPs/CIDRs allowed to access the admin API.  Empty = allow all.
admin_ip_allowlist = []
# Maximum request body size (bytes).  Default 10 MB.
max_request_body_bytes = 10485760
# Per-IP rate limit for the admin API (req/s).  0 = disabled.
# Default 100 req/s per IP (burst 500): protects the management surface from
# brute-force / scripted abuse without disrupting normal admin-UI usage.
api_rate_limit_rps = 100
# CORS origins for admin API.  Empty = deny all cross-origin (secure default).
cors_origins = []

# ── Example host configuration ────────────────────────────────────────────────
# [[hosts]]
# host = "example.com"
# port = 80
# remote_host = "127.0.0.1"
# remote_port = 8080
# guard_status = true

# ── Cluster Configuration (disabled by default — opt-in) ──────────────────────
# Remove the leading '#' characters from the [cluster] section to enable.
#
# [cluster]
# # Enable clustering. Default: false — zero behavior change for standalone deployments.
# enabled = false
#
# # Unique node identifier. Auto-generated from hostname+uuid suffix if empty.
# node_id = ""
#
# # Role assignment. "auto" participates in leader election.
# # Values: "auto" | "main" | "worker"
# role = "auto"
#
# # QUIC listen address for inter-node communication.
# listen_addr = "0.0.0.0:16851"
#
# # Static seed nodes. At least one reachable seed required to join a cluster.
# # seeds = ["10.0.0.1:16851", "10.0.0.2:16851"]
# seeds = []
#
# [cluster.crypto]
# ca_cert   = "/app/certs/cluster-ca.pem"
# node_cert = "/app/certs/node.pem"
# node_key  = "/app/certs/node.key"
# # Auto-generate CA and node certs on first startup (required for initial main).
# auto_generate       = true
# ca_validity_days    = 3650   # 10 years
# node_validity_days  = 365    # 1 year
# renewal_before_days = 7      # auto-renew 7 days before expiry
#
# [cluster.sync]
# rules_interval_secs        = 10    # periodic rule version check
# config_interval_secs       = 30
# events_batch_size          = 100   # flush event batch at this count
# events_flush_interval_secs = 5     # flush even if batch not full
# stats_interval_secs        = 10
# events_queue_size          = 10000 # drop oldest if worker falls behind
#
# [cluster.election]
# timeout_min_ms        = 150    # random election timeout range (ms)
# timeout_max_ms        = 300
# heartbeat_interval_ms = 50     # main → workers heartbeat interval
# phi_suspect           = 8.0
# phi_dead              = 12.0
#
# [cluster.health]
# check_interval_secs   = 5
# max_missed_heartbeats = 3

# ── Community Integration ─────────────────────────────────────────────────────
# Share threat intelligence with the OpenPRX community network.
# Enable to report detected attacks and receive the community blocklist.
# Run `prx-waf community enroll` first to obtain machine_id and api_key.
#
# [community]
# enabled = false
# server_url = "https://community.openprx.dev"
# api_key = ""           # Obtained from: prx-waf community enroll
# machine_id = ""        # Obtained from: prx-waf community enroll
# public_key = ""        # Ed25519 hex (64 chars). If set but invalid, init is refused.
# batch_size = 50        # Number of signals to buffer before flushing
# flush_interval_secs = 30   # Flush buffer even when batch_size not reached
# sync_interval_secs = 300   # Blocklist sync interval (default: 5 minutes)

# ── Threat-Intelligence IP Feeds (disabled by default — opt-in) ───────────────
# Pull raw IP/CIDR blocklists from external open-source intelligence sources and
# fold matching addresses into the WAF IP blacklist (403). NO feed is fetched
# unless you uncomment an [[ip_feeds]] block below.
#
# ⚠ LICENSING — READ BEFORE ENABLING. These sources are free but carry terms:
#   • ET Open (Emerging Threats) — BSD-licensed. Free to use.
#   • Tor exit list              — CC0 / public domain. Free to use.
#   • Spamhaus DROP              — free BUT requires ATTRIBUTION and FORBIDS
#                                  some commercial redistribution. Review
#                                  https://www.spamhaus.org/drop/ terms first.
# Enabling a feed is your acknowledgement of its license. This is why the
# default ships with everything commented out.
#
# format: "plain"         — one IP/CIDR per line; `#` and `;` comments tolerated
#         "spamhaus_json" — Spamhaus DROP JSONL (one {"cidr":...} object/line)
#
# Emerging Threats Open — compromised / known-bad IPs (BSD license):
# [[ip_feeds]]
# name = "et-open-compromised"
# url = "https://rules.emergingthreats.net/blockrules/compromised-ips.txt"
# format = "plain"
# update_interval_secs = 3600
# enabled = true
#
# Tor exit nodes (CC0 / public domain):
# [[ip_feeds]]
# name = "tor-exit-nodes"
# url = "https://check.torproject.org/torbulkexitlist"
# format = "plain"
# update_interval_secs = 3600
# enabled = true
#
# Spamhaus DROP (Don't Route Or Peer) — ATTRIBUTION REQUIRED, see terms above:
# [[ip_feeds]]
# name = "spamhaus-drop"
# url = "https://www.spamhaus.org/drop/drop_v4.json"
# format = "spamhaus_json"
# update_interval_secs = 86400
# enabled = true

# ── CrowdSec Integration ──────────────────────────────────────────────────────
# CrowdSec needs an external LAPI endpoint + bouncer key, so it stays off for a
# zero-config single node. It auto-enables once `api_key` is set (no need to also
# flip `enabled`). A failed connection fails safe (logged, non-fatal).
# Run `prx-waf crowdsec setup` for a guided walkthrough.
#
# [crowdsec]
# enabled = false
# mode = "bouncer"                   # bouncer | appsec | both
# lapi_url = "http://127.0.0.1:8080"
# api_key = ""                       # from: cscli bouncers add prx-waf-bouncer
# update_frequency_secs = 10
# fallback_action = "allow"          # allow | block | log (LAPI bouncer)
# appsec_failure_action = "allow"    # allow | block | log (AppSec, independent)

# ── Lane 2 Semantic Content-Security Engine ───────────────────────────────────
# Additive semantic scoring layer (SQLi/RCE/…) that sits behind the frozen legacy
# detectors. P1b ships the first real detector (structural SQLi).
#
# DEFAULT-ON SHADOW (log_only): the lane is ON by default (`enabled = true`) in
# this shipped config, but runs in shadow — it detects + logs + persists a
# de-identified observation and NEVER blocks. Target-practice measured 0 false
# positives and 100% detection on the bypass corpus, and every preprocessing /
# detection step is bounded by the budget caps below, so shadow-on is a safe
# default. Flip `enforcement_mode` (or a per-family override, below) to change the
# posture. The shipped `log_only` here is byte-for-byte identical to the pre-E0
# behaviour — operators must opt in explicitly to enforce.
#
# enforcement_mode truth table (when `enabled = true`):
#   off       → the lane does NO work: no detection, no LogOnly event, no
#               `semantic_observations` row. Equivalent to `enabled = false`.
#   log_only  → SHADOW: detect + log a LogOnly security event + persist a
#               de-identified observation. NEVER a Block.
#   enforce   → BLOCK-CAPABLE (E0). A Block is produced ONLY when ALL of these
#               hold: the process has passed the restart warmup window
#               (breaker.window), the request's canary bucket is inside
#               `rollout_bps`, the circuit breaker is closed, the host is NOT in
#               `log_only_mode`, and the Block is corroborated by a directly-
#               observable (non-blind/-synthetic) view. Otherwise it stays shadow
#               `Log`. With the shipped `rollout_bps = 0` even `enforce` blocks
#               nothing (empty canary) — set `rollout_bps` to opt in gradually.
#
# A zero-config install with no config file at all also leaves the lane OFF (the
# compiled default is `enabled = false`).
[content_security]
enabled = true                        # master switch (default-on SHADOW; log_only never blocks)
enforcement_mode = "log_only"         # off | log_only (shadow) | enforce (block-capable, opt-in, canary-gated)
dialect = "generic"                   # global; per-host dialects not claimed in P1
hpp = false                           # HTTP-parameter-pollution synthetic views (global off)
rollout_bps = 0                       # canary width in basis points (0..10000); 0 → enforce blocks nothing
rollout_salt = ""                     # stable salt for deterministic canary bucketing

# Per-family enforcement overrides (E0). Each key is an attack family
# (sql_injection / rce / xss / traversal); each value is off | log_only | enforce
# and overrides `enforcement_mode` for THAT family only. A family not listed here
# inherits the global mode, so this table is EMPTY by default (→ pure global
# posture, zero behaviour change). This lets an operator switch the single
# highest-confidence family to enforce while the rest stay shadow, e.g.:
#   [content_security.enforcement_overrides]
#   sql_injection = "enforce"
#
# ── A3 contract: per-host Lane 1 toggles vs Lane 2 families (READ THIS) ────────
# The per-host Lane 1 legacy checker toggles (HostConfig.defense_config.sqli /
# .xss / .rce / .dir_traversal) and the Lane 2 semantic families here are TWO
# INDEPENDENT switch sets. Turning off a host's Lane 1 sqli checker does NOT turn
# off that host's Lane 2 sql_injection family — they must be managed separately.
# The single per-host total kill switch for BOTH lanes' blocking is the host's
# `log_only_mode`: when a host is in log_only_mode, every Lane 1 veto AND every
# Lane 2 enforce Block is downgraded to a LogOnly event for that host. (Runtime
# per-host, per-detector Lane 1 gating of Lane 2 is a backlog item — DefenseConfig
# has no runtime write path today; contract ② applies until then.)
[content_security.enforcement_overrides]

[content_security.budget]             # deterministic DoS work caps (conservative)
max_fields_per_phase = 64
max_views_per_field = 12
max_ast_attempts_per_request = 6
max_ast_input_bytes_total = 262144
max_html_parse_attempts_per_request = 6    # XSS DOM detector HTML5 fragment-parse cap (P-XSS-1)
max_html_parse_input_bytes_total = 262144  # total bytes handed to the HTML parser per request
max_tokens_per_view = 512
max_list_items = 1024
max_preprocess_output_bytes_total = 524288
max_field_input_bytes = 16384         # per-field input cap, checked before any decode/alloc
max_decode_rounds = 3

[content_security.breaker]            # anomaly-rate circuit breaker
window_secs = 300
min_samples = 200
anomaly_rate_threshold = 0.05
cooldown_secs = 900

# Per-attack scoring families (enabled ones require weights summing to 1.0).
# SQLi is defined with the single structural detector. The family only runs when
# the lane above is `enabled = true`.
#
# hard_veto_allowlist is EMPTY: no rule is authorised for single-hit Block before
# holdout calibration (plan v2.2 "先标定、后授权"). Even if a rule were listed, in
# the P1b shadow posture it can only be logged, never enforced.
#
# The structural detector ships high-noise rules (stacked / chr / hex /
# information_schema) DISABLED by default (plan v2.2). Only the lower-FP rules
# (into_outfile / dangerous_fn / union_select / union_null / version_comment) run
# by default; the rest await holdout data before being turned on.
[content_security.attacks.sql_injection]
enabled = true
log_threshold = 30
block_threshold = 80
hard_veto_allowlist = []              # empty until holdout-calibrated (no single-hit Block authorised)
# Two detectors, equal contribution (Σ = 1.0). A single detector firing alone
# scores 0.5 × its confidence; the lowest-confidence default-on structural rule is
# version_comment (conf 70 → 35), so log_threshold = 30 keeps EVERY single
# default-on detector hit observable in shadow (35 ≥ 30, and the higher-confidence
# rules well above). log_threshold = 40 used to silence single hits below conf 80
# (union_select 72 → 36, union_null 78 → 39, version_comment 70 → 35 all < 40),
# dropping their shadow observations — the calibration data the shadow phase exists
# to collect. A Block recommendation still requires BOTH the structural regex
# detector AND the sqlparser AST detector to corroborate on the same field
# (0.5·c_struct + 0.5·c_ast ≥ 80), so no single detector can recommend Block. Still
# shadow (log_only) regardless of score.
[content_security.attacks.sql_injection.weights]
struct_rule = 0.5                     # OpenRASP-style structural / regex detector (P1b)
ast = 0.5                             # sqlparser-rs true-AST detector (P2)

# RCE (shell command injection) — P1c structural detector. Runs on the Lane-2
# decode/normalise views (base64/hex/entity/comment-strip + SHELL de-obfuscation)
# that the frozen Lane 1 RceCheck's URL-decode-only path cannot see. Default-on
# rules are context-narrowed (reverse-shell fingerprints, `$(cmd)` substitution,
# `sh -c` exec flag, pipe-to-shell, fetch+arg, sensitive-file read); the high-noise
# rules (bare separator + common command, backtick-wraps-anything) ship DISABLED
# and await holdout calibration.
[content_security.attacks.rce]
enabled = true
log_threshold = 40
block_threshold = 80
hard_veto_allowlist = []              # empty until holdout-calibrated (no single-hit Block authorised)
# Two-detector corroboration (T1-A): a Block needs BOTH the structural regex and
# the true shell-AST detector (0.5·c_struct + 0.5·c_ast), so no single detector
# recommends Block. Still shadow (log_only) — never enforced pre-holdout.
[content_security.attacks.rce.weights]
rce = 0.5                             # self-authored structural shell-injection detector
rce_ast = 0.5                         # brush-parser true shell-AST detector (T1-A)

# Traversal T1 (encoded path traversal) — P1c structural detector. T0 is the
# frozen Lane 1 DirTraversalCheck (raw `../`, `%2e%2e`, overlong, sensitive abs
# paths). This additive T1 re-catches those structures on the Lane-2-only decode
# views (a traversal wrapped in base64, or split by quotes so `/etc/passwd` never
# appears raw). Default-on: encoded / overlong / sensitive-absolute (almost never
# legitimate); the plain-`../` rule ships DISABLED (relative imports are too noisy)
# and awaits holdout calibration.
[content_security.attacks.traversal]
enabled = true
log_threshold = 40
block_threshold = 80
hard_veto_allowlist = []              # empty until holdout-calibrated (no single-hit Block authorised)
[content_security.attacks.traversal.weights]
traversal = 1.0                       # segment-aware traversal detector

# XSS (P-XSS-1/2) — two-detector HTML5-semantic family. The DOM detector
# (`xss_dom`, P-XSS-1) upgrades XSS from the frozen Lane 1 regex (kept, additive)
# to a WHATWG fragment parse: it fires only on structures that REALLY parse into
# executable content — a `<script>` element, an `on*=` handler on a genuinely-
# parsed element, a dangerous URL scheme (`javascript:` / `data:text/html` /
# `vbscript:`) on a real URL attribute, or `<svg onload>` / `<iframe srcdoc>`.
# Text that merely contains `onclick=` or `<script` (bug comments, docs, CSV, URL
# paths) parses to NO such element and stays clean — the false-positive win over
# the Lane 1 regex. The JS-token detector (`xss_js`, P-XSS-2) is the second
# detector: from that SAME single parse it classifies only ATTACK-SPECIFIC JS
# tokens inside the parsed event-handler values and `javascript:` URL bodies —
# credential/storage theft (document.cookie/document.domain/localStorage), dynamic
# code execution (eval/execScript/import) and obfuscation decode
# (atob/String.fromCharCode/unescape). It deliberately does NOT fire on the plain
# JS a legitimate inline handler routinely carries (a bare fetch/XMLHttpRequest,
# setTimeout, location navigation, .src= assignment, innerHTML write): those are
# evidence of "this is JS", not of an attack. Narrowing to attack-specific verbs
# is what keeps xss_js independent of xss_dom — a real handler trips the DOM
# structure but not the token detector. Runs on every decode view
# (base64/hex/entity), so encoded XSS surfaces too; blind-decoded hits are never
# hard-veto-capable.
#
# Two detectors, equal contribution (Σ = 1.0), mirroring SQLi. A single detector
# firing alone scores 0.5 × its confidence; the lowest default-on construct is
# `xss.data_html_url` (conf 82 → 41) and every other default-on DOM/JS construct
# is higher (event_handler 85 → 42.5, js_sink 85 → 42.5, iframe_srcdoc 85 → 42.5,
# svg_onload 88 → 44, js_exfil 88 → 44, script_tag 90 → 45), so log_threshold = 40
# keeps EVERY single default-on hit observable in shadow. Corroboration raises the
# BLOCK bar: reaching 0.5·c_dom + 0.5·c_js ≥ 80 needs the DOM structure AND a JS
# token on the same field, so no single detector can recommend Block —
# e.g. `<img onerror=eval(document.cookie)>`. NOTE this is a higher Block bar, NOT
# an independent-evidence guarantee for the mainstream XSS surface: a real inline
# handler contains real JS, so DOM-structure and JS-value are correlated there —
# the discrimination comes from xss_js only counting attack-specific actions
# (above), not from the two signals being independent. A legitimate
# `onclick="fetch('/api')"` therefore trips xss_dom alone (Log), not corroboration.
# The Block bar still needs holdout calibration on real traffic before it can gate
# enforcement; everything here is shadow (log_only) and never blocks. The noisy
# `xss.object_embed` / `xss.base_href` DOM constructs ship DEFAULT-OFF (fire-drill
# FP-4: legitimate media/PDF embeds and SPA `<base href>` hit them 3/3).
[content_security.attacks.xss]
enabled = true
log_threshold = 40
block_threshold = 80
hard_veto_allowlist = []              # empty until holdout-calibrated (no single-hit Block authorised)
[content_security.attacks.xss.weights]
xss_dom = 0.5                         # HTML5 DOM semantic detector (P-XSS-1)
xss_js = 0.5                          # lightweight JS-token detector (P-XSS-2)

# XXE (XML external entity) — T2-A single-detector structural family. Matches the
# DTD / prolog markers of an XML-external-entity attack (external
# `<!ENTITY … SYSTEM/PUBLIC>`, parameter-entity `<!ENTITY % …>` definitions, and —
# default-off — external `<!DOCTYPE … SYSTEM/PUBLIC>`, bare `%name;` references,
# internal-entity expansion / billion-laughs) on the SAME normalised view text as
# the other structural detectors. It runs NO XML parser: the XXE grammar is a set
# of textual markers, and not parsing removes the entire parse-time DoS surface
# (billion-laughs entity expansion / deep nesting / oversized entities) — the
# input is already length/token-bounded by the preprocessor budget, so every rule
# is a bounded linear scan and the billion-laughs indicator is a bounded frequency
# count, never an expansion. Single detector → weight 1.0; FP control is by narrow
# default-on rules (external entity decl / parameter-entity def, essentially never
# benign) + default-off high-noise rules (external DOCTYPE as used by every XHTML
# page, bare `%name;`, a few internal entity decls). Shadow (log_only): a single
# default-on hit scores its confidence (entity_external 90, param_entity_def 80)
# and is recorded/logged, never blocked. hard_veto_allowlist empty until holdout.
[content_security.attacks.xxe]
enabled = true
log_threshold = 40
block_threshold = 80
hard_veto_allowlist = []              # empty until holdout-calibrated (no single-hit Block authorised)
[content_security.attacks.xxe.weights]
xxe_struct = 1.0                      # structural XXE detector (T2-A)
