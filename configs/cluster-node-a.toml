# PRX-WAF Cluster Node A — Main Node
# Used with docker-compose.cluster.yml
# Requires pre-generated certs in the cluster_certs volume (run cert-init first).

[proxy]
listen_addr     = "0.0.0.0:80"
listen_addr_tls = "0.0.0.0:443"

[api]
listen_addr = "0.0.0.0:9527"

[storage]
database_url    = "postgresql://prx_waf:prx_waf@postgres:5432/prx_waf"
max_connections = 20

[cache]
enabled          = true
max_size_mb      = 256
default_ttl_secs = 60
max_ttl_secs     = 3600

[http3]
enabled     = false
listen_addr = "0.0.0.0:443"

[security]
admin_ip_allowlist      = []
max_request_body_bytes  = 10485760
api_rate_limit_rps      = 0
cors_origins            = []

# ── Cluster — Node A (Main) ───────────────────────────────────────────────────
[cluster]
enabled     = true
node_id     = "node-a"
role        = "main"
listen_addr = "0.0.0.0:16851"
seeds       = []            # Main has no seeds; workers connect to it

[cluster.crypto]
ca_cert        = "/certs/cluster-ca.pem"
ca_key         = "/certs/cluster-ca.key"   # Main node holds the CA key
node_cert      = "/certs/node-a.pem"
node_key       = "/certs/node-a.key"
auto_generate  = false                     # Certs pre-generated by cert-init

[cluster.sync]
rules_interval_secs        = 10
config_interval_secs       = 30
events_batch_size          = 100
events_flush_interval_secs = 5
stats_interval_secs        = 10
events_queue_size          = 10000

[cluster.election]
timeout_min_ms        = 150
timeout_max_ms        = 300
heartbeat_interval_ms = 50
phi_suspect           = 8.0
phi_dead              = 12.0

[cluster.health]
check_interval_secs   = 5
max_missed_heartbeats = 3
